    <script>
        function rev(a)
        {
           var r = 0;

    while (a > 0) {
        r = r * 10 + (a % 10);
        a = Math.floor(a / 10);
        }
        return r
    }
        var reversed=rev(47);
        console.log(reversed)
    </script>
