<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function fact(a)
        {
            var facts=1
            for(var i=1;i<=a;i++)
        {
            facts=facts*i
        }
        return facts
        }
        var factorial = fact(4);
        console.log(factorial)
    </script>
</body>
</html>
<!-- factorial of a given number-->
