<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a =300;
        var b=200;

        console.log("Before Swapping");
        console.log("a = ", a);
        console.log("b = ", b);

        [a,b] = [b,a]
        console.log("After Swapping");
        console.log("a = ", a);
        console.log("b = ", b);
    </script>
</body>
</html>
