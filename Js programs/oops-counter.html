<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class counter{
            count=0;
            title;
            constructor(t,i){
                this.count=i;
                this.title=t;
                this.createcounter();

            }
            createcounter(){
                var ch1=document.createElement("h1")
                ch1.innerText=this.title+":" + this.count
                var incbtn = document.createElement("button")
                incbtn.innerText="Increment"
                incbtn.onclick=()=>{
                    this.count++;
                    ch1.innerText=this.title+":" + this.count
                }
                document.body.appendChild(ch1)
                document.body.appendChild(incbtn)
            }

        }
        var counter1 = new counter("India",0)
        var counter2 = new counter("USA",0)

    </script>
</body>
</html>
