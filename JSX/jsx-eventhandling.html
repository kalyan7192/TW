            {

            {
                url:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200",

        ]
        var i = 0;
        function inc() {
            if (i >= images.length - 1) {
                i = -1;
            }
            i = i + 1;
            next();
            console.log(i);
        }
        function like() {
            images[i].likes = images[i].likes + 1;
            next();
        }
        function next() {
            var gallery = <div>
                <img src={images[i].url} alt="Gallery Image" id="image"></img>
                
                <button onClick={() => like()}>Like</button>
                <b>  ({images[i].likes})</b>

                <br />

                <button onClick={() => inc()}>Next</button>
            </div>
            ReactDOM.render(gallery, document.getElementById('root'))
        }
        next();
