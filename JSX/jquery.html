<style>
    .cardgroup {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    .card {
        list-style: none;
        border: 1px solid gray;
        padding: 10px;
        border-radius: 20px;
        width: 200px;
        margin: 20px;
        background-color: skyblue;
    }
</style>

<body>
    <h1>Hello Kalyan 10+20</h1>
    <div id="root"></div>
    <div id="root2"></div>
    <script type="text/babel">

        var mystudents = [
            { name: 'Kalyan', age: 30, place: 'Hyderabad' },
            { name: 'Ravi', age: 25, place: 'Bangalore' },
            { name: 'Suresh', age: 28, place: 'Chennai' },
            { name: 'Naresh', age: 32, place: 'Mumbai' },
            { name: 'Ramesh', age: 27, place: 'Pune' }
        ]

        var jsx3 = <ul class="cardgroup">
            {
                mystudents.map(function (student) {
                    return <li class="card">
                        <h2>{student.name}</h2>
                        <h4>Age: {student.age}</h4>
                        <h4>Place: {student.place}</h4>
                    </li>
                })
            }
        </ul>
        ReactDOM.render(jsx3, document.getElementById('root2'))

        var jsx4 = <table border="1" cellPadding="10" cellSpacing="0">
            <thead style={{ backgroundColor: "grey", color: "white" }}   >
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Place</th>
                </tr>
            </thead>
            <tbody>
                {
                    mystudents.map(function (student) {
                        return <tr>
                            <td>{student.name}</td>
                            <td>{student.age}</td>
                            <td>{student.place}</td>
                        </tr>
                    })
                }
            </tbody>
        </table>
        ReactDOM.render(jsx4, document.getElementById('root'))
