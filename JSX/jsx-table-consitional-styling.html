        function renderTable() {
            const jsx = (
                <table border="1" cellPadding="10" cellSpacing="0" align="center">
                    <thead style={{ backgroundColor: "lightgray" }}>
                        <tr>
                            <th onClick={sortname} style={{ cursor: "pointer" }}>Full Name</th>
                            <th onClick={sortage} style={{ cursor: "pointer" }}>Age</th>
                            <th onClick={sortgender} style={{ cursor: "pointer" }}>Gender</th>
                            <th onClick={sortplace} style={{ cursor: "pointer" }}>Place of Birth</th>
                            <th onClick={sortmovies} style={{ cursor: "pointer" }}>Movies</th>
                        </tr>
                    </thead>
                    <tbody>
                        {actors.map((actor) => (
                            <tr id={actor.gender === "male" ? "male" : "female"}>
                                <td>{actor.fullname}</td>
                                <td>{actor.age}</td>
                                <td>
                                    {actor.gender}
                                    {actor.gender === "male" ? " \uD83D\uDC66" : " \uD83D\uDC67"}
                                </td>
                                <td>{actor.placeOfBirth}</td>
                                <td>{actor.movies}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            );

            ReactDOM.render(jsx, document.getElementById("root"));
        }

        function sortname() {
            actors.sort((a, b) => a.fullname.localeCompare(b.fullname));
            renderTable();
        }

        function sortage() {
            actors.sort((a, b) => a.age - b.age);
            renderTable();
        }

        function sortgender() {
            actors.sort((a, b) => a.gender.localeCompare(b.gender));
            renderTable();
        }

        function sortplace() {
            actors.sort((a, b) => a.placeOfBirth.localeCompare(b.placeOfBirth));
            renderTable();
        }

        function sortmovies() {
            actors.sort((a, b) => a.movies - b.movies);
            renderTable();
        }
