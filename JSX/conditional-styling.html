<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="d1"></h1>
    <script>
        var p = +prompt("Enter your number:");
        var h = "";
        if(p%2==0){
            h="Even"
        }
        else{
            h="Odd"
        }
        document.getElementById("d1").innerText=h
    </script>
</body>
</html>
