<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        #template{
            background-color: #020c19 ;
            border: 2px solid black;
            width: 100%;
            height: 100vh;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
        }
        .card{
            text-align: center;
            font-size: 10px;
            border-color: 2px solid blue;
        }
        .card h1{
            color: white;
            font-size: 40px;
            height: 100px;padding: 10px;
        }
        #feature{
            width: 200px;
            height: 40px;
            display: inline-block;
            border: 1px solid blue;
            color: blue;
            border-radius: 20px;
        }
        .card p{
            color:#bdc1ba;
            font-size: 20px;
        }
        #b1{
            background-color: blue;
            width: 130px;
            height: 40px;
            color: white;
            border-radius: 10px;
            border: 1px solid blue;
        }
        #b2{
            background-color:#141e2b;
            color: white;
            width: 130px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid #66686b;
        }
        @media  screen and (max-width:1000px){
            .card{
                width: 100%;
            }
        }
         #navbar{
            width: 100%;
            height: 100px;
            background-color:#0c1623;
            position: sticky;
            top: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }
        .head{
            align-items: center;
            display: inline-block;
            color: white;
            font-size: 20px;
            padding: 10px;
        }
        .icon{
            color: white;
            font-size: 40px;
            padding: 10px;
        }
        @media screen and (max-width:650px){
             .icon{
                margin-left: auto;
            }
            .head{
                display: none;
            }
        }
        @media screen and (min-width:651px){
            .icon{
                display: none;
            }
            .head{
                display: block;
            }
            }
    </style>
</head>
<body>
    <div id="navbar">
        <div class="head">Home</div>
        <div class="head">Services</div>
        <div class="head">About</div>
        <div class="head">Portofolio</div>
        <div class="head">Team</div>
        <span class="icon">&#9776;</span>
    </div>
    <div id="template">
        <div class="card">
            <div id="feature">
            <h2>New Feature Launch</h2>
            </div>
            <h1>Accelerate Your Business Growth</h1>
            <p>Our powerful SaaS platform helps modern teams increase 
              productivity by 40% and reduce operational costs. Join over
               10,000+ companies already transforming their workflow.</p>
            <button id="b1">Start Free Trail</button>
            <button id="b2">Watch Demo</button>
        </div>
    </div>
</body>
</html>
