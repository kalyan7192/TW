<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="h1"></h1>
    <button onclick="stp()" id="b1">Stop</button>
    <button onclick="str()" id="b2">Start</button>


</body>
<script>
    var a
    var value = 0
    
    function strd() {
        a = setInterval(function () {
            value = value + 1
            document.getElementById("h1").innerText = value
        }, 500)
    }
    strd()
    function stp() {
        clearInterval(a)
    }
    function str() {
        strd()
    }
</script>

</html>
